description: 'Suicide-loss (bereavement) support group listed in AFSP''s Find a Support Group directory.
  Sponsored by Friends for Survival, Inc. Open to: Friends For Survival, organized by and for survivors,
  has been offering suicide bereavement support services since 1983. We are a tax-exempt charitable, national
  non-profit bereavement outreach organization available to those who are grieving a suicide death of
  family or friends. We also assist professionals who work with those who are grieving a suicide tragedy.
  In our meetings and webinars, we share our struggles with grief after a suicide death. We share our
  frustrations and questions. We take this journey together as we help each other cope. Our meetings are
  peer support, not therapy sessions. No fee.'
