description: 'Suicide-loss (bereavement) support group listed in AFSP''s Find a Support Group directory.
  Sponsored by Sentier Psychotherapy. Open to: This group is open to adult survivors of suicide loss who
  are age 25 years and older. The loss of a loved one needs to have taken place 3+ months prior to joining
  the group. Fee: Group cost is $50 for the required screening and per group session. Sliding fee available,
  inquire with therapist as needed. Superbills are provided for all group members and are particularly
  helpful for those who would like to submit to HSA, flex accounts, or insurance providers for out-of-network
  reimbursement. Therapist may be able to submit out-of-network insurance claims if requested following
  payment.'
