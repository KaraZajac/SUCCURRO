description: 'Suicide-loss (bereavement) support group listed in AFSP''s Find a Support Group directory.
  Sponsored by The Tristesse Grief Center. Open to: Survivors of Suicide Loss Group is a loss-specific
  grief group and addresses the unique experiences of those who have experienced the death of a loved
  one by suicide. Group covers topics including coping with loss, remembering loved ones, the needs of
  grievers, changes after loss and caring for oneself while grieving. Group members can find connection
  with others who understand what it is like to lose someone by suicide. No fee.'
