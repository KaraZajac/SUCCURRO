id: us/sibling-survivors-of-suicide-and-overdose-group
name: Sibling Survivors of Suicide and Overdose Group
categories:
- suicide-prevention
- peer-support
description: 'Nationwide online suicide-loss (bereavement) support group listed in AFSP''s Find a Support
  Group directory. Open to: Losing a sibling to an overdose or suicide has unique challenges, which are
  often overlooked by family, friends, and society at large. This 8-week group is for people in their
  20s and 30s who have lost a sibling (half, step, full, etc.) to a drug overdose or suicide. The group
  aims to create a space for sibling survivors to support each other and find meaning in life after loss.
  PLEASE NOTE: all are welcome, regardless of previous experience in group and/or therapy. Fee: The fee
  for each group is $85 per session, in addition to the intake fee of $85.'
