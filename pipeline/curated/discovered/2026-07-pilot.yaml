# Discovery batch: BMF-verify pilot, 2026-07. Loaded by pipeline/discovered.py;
# design in docs/research/discovery-engine-design.md.
#
# Candidates pulled from sources/irs/eo{1..4}.csv by NTEE class x gap city from
# docs/research/bmf-gap-audit-2026-07.md: seniors P81 (Philadelphia, Chicago,
# Phoenix, Baltimore, Houston, St. Louis), crisis F40/F42/P43 (Los Angeles,
# Las Vegas, Phoenix, Dallas, Detroit, Charlotte), financial P51/P60 (New York,
# Lawrenceville, Marietta, Scottsdale, Douglasville, Lakewood NJ).
# Every org below was verified against its own live website on the date in
# run_on / verified_on; `checked:` records what was confirmed (audit trail,
# not emitted). DV policy: domestic-violence orgs carry no address at any
# precision — `city:` is a place-resolution hint only.
batch: 2026-07-pilot
run_on: "2026-07-20"
title: BMF discovery pilot — seniors/crisis/financial gap cities
notes: >-
  Hand-verified discovery batch. Candidates selected from the cached IRS EO BMF
  (July 2026 pull) by NTEE class x gap city per the 2026-07 BMF gap audit;
  each org's own website was fetched and confirmed live, currently providing
  direct services matching its category, and still operating in-state.
  Grantmakers, employee funds, shells, dead sites, and moved/defunct orgs were
  rejected (funnel: 268 candidates pulled, 144 web-checked, 43 verified, 101
  rejected; second wave verified on 2026-07-21; 2 of the 43 already exist under
  their operating names from other sources and are skipped by the loader).
  Each record's website field is the page it was verified against; the per-org
  checked field in the batch file (pipeline/curated/discovered/2026-07-pilot.yaml)
  records what was confirmed. Domestic-violence orgs carry no address per the
  DV safety policy in DATA-RIGHTS.md.
