# TSML feed registry: AA intergroups (and compatible fellowships) whose sites
# publish a 12 Step Meeting List JSON feed. Hand-maintained; verify a feed with
#   curl -sL '<feed>' | head -c 300   (expect a JSON array of meeting objects)
# state: the feed's home state (fallback when an address doesn't parse).
# ua: browser  -> site WAF blocks non-browser clients; fetch with browser-like UA.
# Cache-file feeds (/wp-content/tsml-cache-<hash>.json): hash rotates; if a feed
# 404s, re-discover the hash on the site's /meetings/ page.
# Discovery sweep 2026-07-19; 17 more intergroups run TSML with restricted
# (401/nonce-or-key) feeds — see docs/sources.md #4 escalation notes.
