# Feeding America member food-bank pantry/agency locator registry.
# One row per scrapeable bank (survey: docs/research/foodbank-locators-2026-07.md),
# keyed to the bank's data/orgs id. Verify an endpoint with
#   curl -sL '<endpoint>' | head -c 300
# Platforms: wpsl (WP Store Locator admin-ajax), wpgmza (WP Go Maps REST),
# asl (Agile Store Locator), slp (Store Locator Plus), storepoint, storerocket,
# mymaps (Google My Maps KML), arcgis (FeatureServer), ssf (Super Store Finder XML),
# foodfinder (Rails/React food-finder app, data-props inline JSON), plus per-bank
# custom parsers (platform: custom, parser: <name>) for static-HTML/inline-JSON sites.
#
# PERMISSION-FIRST (STRONG anti-automation ToS; do NOT add until an affirmative yes,
# same gate as AmpleHarvest — see DATA-RIGHTS.md):
#   md/maryland-food-bank        (static HTML, ToS bans automated scraping)
#   oh/freestore-foodbank        (Google My Maps mid=14JPRi0SFtdGN_pOP6c7w4vJpvXlvl0I)
#   mi/food-bank-of-eastern-michigan  (Store Locator Plus at fbem.org)
#   ca/food-bank-for-monterey-county  (MapSVG; needs headless anyway)
# Excluded for other reasons (2026-07 build):
#   all 67 Vivery/AccessFood banks     - platform ToS, rejected per DATA-RIGHTS
#   nc/food-bank-of-the-albemarle      - locator 404, homepage 403 (WAF)
#   nc/second-harvest-food-bank-of-northwest-north-caro - ArcGIS embed resolves to
#     the statewide "NC Summer Meals for Children" app, not an agency network
#   al/heart-of-alabama-food-bank      - find-help map is the multi-bank Feeding
#     Alabama statewide webmap (sheet-backed layers, per-layer org attribution
#     unclear) - needs its own design pass
#   oh/the-foodbank-inc (Dayton)       - JetEngine AJAX-paginated listing, needs headless
#   ny/feeding-westchester, va/foodbank-of-southeastern-virginia-and-the-easter -
#     wpsl nonce-gated (store_search returns empty)
#
# Fields: id (registry slug = org id with / -> -), org (data/orgs FK), name
# (publisher), state (home state, fallback), platform, endpoint (data URL),
# url (human locator page for the source record), floor (min plausible records),
# verify (api|scrape verified-method stamp). Optional: sweep {box:[latmin,latmax,
# lngmin,lngmax], step, max_results, radius} for page-capped wpsl; fields/oid for
# arcgis; state_field where the feed is multi-state; parser for custom; ua: browser;
# keep (category allowlist); notes.

